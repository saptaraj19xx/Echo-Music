name: echo
description: "Echo - A modern AI-powered music streaming application."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.11.0 <4.0.0"

# ==========================================================
# Dependencies
# ==========================================================

dependencies:
  flutter:
    sdk: flutter

  # Cupertino Icons
  cupertino_icons: ^1.0.8

  # Pickers (Upload Song screen)
  file_picker: ^8.1.6
  image_picker: ^1.1.2

  # Typography
  google_fonts: ^6.3.0

  # State Management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^16.0.0

  # Functional Programming
  dartz: ^0.10.1

  # Local Storage
  shared_preferences: ^2.5.3

  # Animations
  flutter_animate: ^4.5.2

  # Firebase
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.12
  firebase_storage: ^12.4.10

  just_audio: ^0.10.5
  just_audio_windows: ^0.2.3

  palette_generator: ^0.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

# ==========================================================
# Flutter
# ==========================================================

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/logos/
    - assets/music/

